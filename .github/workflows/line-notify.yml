name: KHT LINE Daily Reminder

on:
  workflow_dispatch:   # trigger โดย cron-job.org ทุก 15:00 และ 17:15 (Bangkok, จันทร์–เสาร์)

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth requests

      - name: Run notifier
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_GROUP_ID:      ${{ secrets.LINE_GROUP_ID }}
          SHEET_ID:           ${{ secrets.SHEET_ID }}
        run: python notify.py
